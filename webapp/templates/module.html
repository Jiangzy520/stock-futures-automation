<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }} - 观澜量化 Web</title>
    <link rel="stylesheet" href="/static/app.css?v=20260316_push3" />
  </head>
  <body data-slug="{{ slug }}">
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <header class="topbar glass">
      <div class="brand">
        <div class="dot"></div>
        <div class="title-wrap">
          <h1>{{ title }}</h1>
          <p>观澜量化 Web 模块页</p>
        </div>
      </div>
      <div class="runtime">
        <span id="moduleRuntime" class="pill">{{ mode or "MOCK" }}</span>
        <span id="moduleClock" class="clock">--:--:--</span>
        <a class="btn ghost" href="/">返回首页</a>
      </div>
    </header>

    <section class="module-cards">
      {% for key, name in modules.items() %}
      <a class="card-btn {% if key == slug %}active{% endif %}" href="/module/{{ key }}">{{ name }}</a>
      {% endfor %}
    </section>

    <main class="layout" style="grid-template-columns: 1fr; grid-template-rows: auto;">
      <section class="panel glass" style="min-height: 620px;">
        <div class="panel-header">
          <h2>{{ title }}</h2>
          <span id="moduleStat" class="pill">加载中</span>
        </div>
        <div id="moduleControls" class="actions" style="margin-bottom: 10px;"></div>
        <div id="moduleHint" class="chat-box" style="height: auto; min-height: 260px;">正在加载 {{ title }} 数据...</div>
      </section>
    </main>

    <div id="toast" class="toast"></div>
    <script src="/static/module.js?v=20260316_push3"></script>
  </body>
</html>
