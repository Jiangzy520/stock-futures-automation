name: Syntax Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Compile Python sources
        run: |
          python -m compileall guanlan tools webapp strategies examples run.py
